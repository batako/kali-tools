name: test

on:
  push:
    branches:
      - dev
      - main

jobs:
  go-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check go mod tidy
        run: go mod tidy -diff

      - name: Check Go formatting
        run: test -z "$(gofmt -l cmd internal)"

      - name: Run tests
        run: go test ./...

      - name: Check package configuration
        run: ./scripts/check-package-config.sh

      - name: Audit ctx integration contract
        run: ./scripts/check-ctx-integration.sh

      - name: Check package versions
        run: |
          for command_dir in cmd/*; do
            ./scripts/check-version.sh "$(basename "${command_dir}")"
          done
