name: publish-apt-repo

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code

      - name: Run tests
        run: go test ./...

      - name: Check ctx version
        run: ./scripts/check-version.sh ctx

      - name: Check xssh version
        run: ./scripts/check-version.sh xssh

      - name: Build Debian packages
        run: |
          ./scripts/build-deb.sh req amd64
          ./scripts/build-deb.sh req arm64
          ./scripts/build-deb.sh ctx amd64
          ./scripts/build-deb.sh ctx arm64
          ./scripts/build-deb.sh xssh amd64
          ./scripts/build-deb.sh xssh arm64

      - name: Restore existing APT repository
        run: |
          mkdir -p repo
          if git ls-remote --exit-code --heads origin apt-repo >/dev/null 2>&1; then
            restore_dir="$(mktemp -d)"
            git fetch origin apt-repo:refs/remotes/origin/apt-repo
            git archive origin/apt-repo | tar -x -C "${restore_dir}"
            cp -R "${restore_dir}/." repo/
          fi

      - name: Build APT repository
        run: ./scripts/build-apt-repo.sh

      - name: Publish apt-repo branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          publish_dir="$(mktemp -d)"
          cp -R repo/. "${publish_dir}/"
          cd "${publish_dir}"
          git init -b apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update APT repository for ${GITHUB_SHA}" || exit 0
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin HEAD:apt-repo
